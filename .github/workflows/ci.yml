name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check repository layout
        run: python scripts/check_repository.py

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Python package presence
        id: python-package
        shell: bash
        run: |
          if [ -f Python/rdhte/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Python/rdhte is not present yet; skipping Python package checks."
          fi

      - name: Set up Python
        if: steps.python-package.outputs.present == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        if: steps.python-package.outputs.present == 'true'
        run: python -m pip install --upgrade pip build pytest

      - name: Install Python package
        if: steps.python-package.outputs.present == 'true'
        working-directory: Python/rdhte
        run: python -m pip install -e .

      - name: Run Python tests
        if: steps.python-package.outputs.present == 'true'
        working-directory: Python/rdhte
        run: python -m pytest

      - name: Build Python package
        if: steps.python-package.outputs.present == 'true'
        working-directory: Python/rdhte
        run: python -m build

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(c("rdrobust", "sandwich", "multcomp", "knitr", "rmarkdown", "jsonlite", "broom", "testthat", "xtable"), repos = repos)
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/rdhte

      - name: Check R package
        run: R CMD check rdhte_*.tar.gz --no-manual
